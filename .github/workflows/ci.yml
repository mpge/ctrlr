name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build-and-test:
    name: Build & Test (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libusb-1.0-0-dev build-essential

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # `pnpm build` runs `tsup --dts`, which is itself a `tsc --noEmit` pass.
      # Running `pnpm typecheck` separately fails on a cold workspace because
      # tsc resolves `@ctrlr/*` via each package's `types` field (`./dist/...`),
      # which doesn't exist until build emits it. Build first; cross-package
      # typecheck happens implicitly during DTS emit. The standalone
      # `pnpm typecheck` is still useful in dev — just run it after a build.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      # End-to-end CLI smoke against the actual built binary — catches
      # regressions in module wiring (broken exports, ESM/CJS interop, IPC
      # path resolution) that the unit tests don't cover.
      - run: pnpm smoke
